version: 1
metadata:
  name: 默认来源认证流程
entries:
- attrs:
    designation: authentication
    name: 欢迎使用 authentik！
    title: 欢迎使用 authentik！
    authentication: require_unauthenticated
  identifiers:
    slug: default-source-authentication
  model: authentik_flows.flow
  id: flow
- attrs:
    expression:  |
      # 该策略确保此流程只能用于单点登录流程，也就是用户来自外部身份提供商
      return ak_is_sso_flow
  identifiers:
    name: default-source-authentication-if-sso
  id: default-source-authentication-if-sso
  model: authentik_policies_expression.expressionpolicy
- identifiers:
    name: default-source-authentication-login
  id: default-source-authentication-login
  model: authentik_stages_user_login.userloginstage
- identifiers:
    order: 0
    stage: !KeyOf default-source-authentication-login
    target: !KeyOf flow
  model: authentik_flows.flowstagebinding
- identifiers:
    order: 0
    policy: !KeyOf default-source-authentication-if-sso
    target: !KeyOf flow
  model: authentik_policies.policybinding
