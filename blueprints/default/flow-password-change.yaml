version: 1
metadata:
  name: 默认密码修改流程
entries:
- attrs:
    check_static_rules: true
    check_zxcvbn: true
    length_min: 8
    password_field: password
    zxcvbn_score_threshold: 2
    error_message: 密码长度需要至少 8 个字符。
  identifiers:
    name: default-password-change-password-policy
  model: authentik_policies_password.passwordpolicy
  id: default-password-change-password-policy
- attrs:
    designation: stage_configuration
    name: 修改密码
    title: 修改密码
    authentication: require_authenticated
  identifiers:
    slug: default-password-change
  model: authentik_flows.flow
  id: flow
- attrs:
    order: 300
    placeholder: 密码
    placeholder_expression: false
    required: true
    type: password
    field_key: password
    label: 密码
  identifiers:
    name: default-password-change-field-password
  id: prompt-field-password
  model: authentik_stages_prompt.prompt
- attrs:
    order: 301
    placeholder: 重复密码
    placeholder_expression: false
    required: true
    type: password
    field_key: password_repeat
    label: 重复密码
  identifiers:
    name: default-password-change-field-password-repeat
  id: prompt-field-password-repeat
  model: authentik_stages_prompt.prompt
- attrs:
    fields:
    - !KeyOf prompt-field-password
    - !KeyOf prompt-field-password-repeat
    validation_policies:
    - !KeyOf default-password-change-password-policy
  identifiers:
    name: default-password-change-prompt
  id: default-password-change-prompt
  model: authentik_stages_prompt.promptstage
- identifiers:
    name: default-password-change-write
  id: default-password-change-write
  model: authentik_stages_user_write.userwritestage
  attrs:
    user_creation_mode: never_create
- identifiers:
    order: 0
    stage: !KeyOf default-password-change-prompt
    target: !KeyOf flow
  model: authentik_flows.flowstagebinding
- identifiers:
    order: 1
    stage: !KeyOf default-password-change-write
    target: !KeyOf flow
  model: authentik_flows.flowstagebinding
