metadata:
  labels:
    blueprints.goauthentik.io/system-oobe: "true"
    blueprints.goauthentik.io/system: "true"
  name: 默认首次设置流程
version: 1
entries:
- attrs:
    denied_action: message_continue
    designation: stage_configuration
    name: 默认首次设置
    title: 欢迎使用 authentik！
  id: flow
  identifiers:
    slug: initial-setup
  model: authentik_flows.flow
- attrs:
    order: 100
    initial_value:
      return f"欢迎使用 {request.brand.branding_title}！请为默认管理员用户 akadmin 设置密码和邮箱地址。"
    initial_value_expression: true
    placeholder_expression: false
    required: true
    type: static
    field_key: oobe-header-text
    label: 首次设置说明
  id: prompt-field-header
  identifiers:
    name: initial-setup-field-header
  model: authentik_stages_prompt.prompt
- attrs:
    order: 101
    placeholder: 管理员邮箱
    placeholder_expression: false
    required: true
    type: email
    field_key: email
    label: 邮箱
  id: prompt-field-email
  identifiers:
    name: initial-setup-field-email
  model: authentik_stages_prompt.prompt
- attrs:
    order: 300
    placeholder: 密码
    placeholder_expression: false
    required: true
    type: password
    field_key: password
    label: 密码
  id: prompt-field-password
  identifiers:
    name: initial-setup-field-password
  model: authentik_stages_prompt.prompt
- attrs:
    order: 301
    placeholder: 重复密码
    placeholder_expression: false
    required: true
    type: password
    field_key: password_repeat
    label: 重复密码
  id: prompt-field-password-repeat
  identifiers:
    name: initial-setup-field-password-repeat
  model: authentik_stages_prompt.prompt
- attrs:
    expression: |
      # 该策略通过注入 "pending_user" 为当前运行的流程设置用户
      akadmin = ak_user_by(username="akadmin")
      context["flow_plan"].context["pending_user"] = akadmin
      return True
  id: policy-default-oobe-prefill-user
  identifiers:
    name: default-oobe-prefill-user
  model: authentik_policies_expression.expressionpolicy
- attrs:
    expression: |
      # 该策略确保只有管理员用户尚未设置密码时才能执行设置流程
      akadmin = ak_user_by(username="akadmin")
      # 确保流程以正确方式启动
      started_by = context.get("goauthentik.io/core/setup/started-by")
      if started_by != "setup":
          setup_url = request.http_request.build_absolute_uri("/")
          ak_message(f"请访问 {setup_url} 打开初始设置。")
          return False
      return akadmin is None or not akadmin.has_usable_password()
  id: policy-default-oobe-password-usable
  identifiers:
    name: default-oobe-password-usable
  model: authentik_policies_expression.expressionpolicy
- state: absent
  identifiers:
    name: default-oobe-flow-set-authentication
  model: authentik_policies_expression.expressionpolicy
- attrs:
    fields:
    - !KeyOf prompt-field-header
    - !KeyOf prompt-field-email
    - !KeyOf prompt-field-password
    - !KeyOf prompt-field-password-repeat
  id: stage-default-oobe-password
  identifiers:
    name: stage-default-oobe-password
  model: authentik_stages_prompt.promptstage
- id: stage-default-authentication-login
  identifiers:
    name: default-authentication-login
  model: authentik_stages_user_login.userloginstage
- id: stage-default-password-change-write
  identifiers:
    name: default-password-change-write
  model: authentik_stages_user_write.userwritestage
  attrs:
    user_creation_mode: never_create
- attrs:
    evaluate_on_plan: true
    invalid_response_action: retry
    re_evaluate_policies: false
  identifiers:
    order: 10
    stage: !KeyOf stage-default-oobe-password
    target: !KeyOf flow
  model: authentik_flows.flowstagebinding
- attrs:
    evaluate_on_plan: false
    invalid_response_action: retry
    re_evaluate_policies: true
  id: binding-password-write
  identifiers:
    order: 20
    stage: !KeyOf stage-default-password-change-write
    target: !KeyOf flow
  model: authentik_flows.flowstagebinding
- attrs:
    evaluate_on_plan: true
    invalid_response_action: retry
    re_evaluate_policies: false
  id: binding-login
  identifiers:
    order: 100
    stage: !KeyOf stage-default-authentication-login
    target: !KeyOf flow
  model: authentik_flows.flowstagebinding
- identifiers:
    order: 0
    policy: !KeyOf policy-default-oobe-password-usable
    target: !KeyOf flow
  model: authentik_policies.policybinding
- identifiers:
    order: 0
    policy: !KeyOf policy-default-oobe-prefill-user
    target: !KeyOf binding-password-write
  model: authentik_policies.policybinding
